name: Content correction
description: Report an error in the notes, such as a wrong formula, typo, definition, or explanation.
title: "[Correction] "
labels: ["content", "correction"]
body:
  - type: dropdown
    id: course
    attributes:
      label: Course
      options:
        - Advanced Computer Architectures
        - Advanced Methods for Scientific Computing
        - Applied Statistics
        - Artificial Neural Networks and Deep Learning
        - Calcolo Numerico
        - Computing Infrastructures
        - Foundations of Operations Research
        - Network Computing
        - Numerical Linear Algebra
        - Numerical Methods for Partial Differential Equations
        - Parallel Computing
        - Quantum Computing
        - Quantum Physics
        - Software Engineering for HPC
        - Other
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location
      description: File, chapter, section, page, equation, or paragraph.
      placeholder: "e.g. quantum-computing/notes, Section 4.2, page 31"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What is wrong?
      placeholder: "Describe the mistake clearly."
    validations:
      required: true

  - type: textarea
    id: correction
    attributes:
      label: Suggested correction
      placeholder: "Write the corrected formula, sentence, or explanation if possible."

  - type: textarea
    id: source
    attributes:
      label: Source / reference
      placeholder: "Slides, book page, paper, lecture note, or reasoning."
