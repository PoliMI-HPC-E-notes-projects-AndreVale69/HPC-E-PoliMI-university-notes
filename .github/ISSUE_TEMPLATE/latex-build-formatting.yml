name: LaTeX build / formatting
description: Report LaTeX compilation errors, broken references, bad layout, or formatting problems.
title: "[LaTeX] "
labels: ["latex", "formatting"]
body:
  - type: input
    id: file
    attributes:
      label: File
      placeholder: "e.g. quantum-computing/notes/sections/..."
    validations:
      required: true

  - type: dropdown
    id: problem_type
    attributes:
      label: Problem type
      options:
        - Compilation error
        - Warning
        - Bad formatting
        - Broken reference
        - Broken citation
        - Figure / TikZ / Quantikz problem
        - PDF output problem
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: "Describe the issue."
    validations:
      required: true

  - type: textarea
    id: log
    attributes:
      label: Error log
      render: text
      placeholder: "Paste the relevant LaTeX error or warning."

  - type: textarea
    id: expected
    attributes:
      label: Expected output
      placeholder: "What should the PDF look like?"
