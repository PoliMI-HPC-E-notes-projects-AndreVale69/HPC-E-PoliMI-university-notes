name: Missing content
description: Track a missing topic, lecture, section, example, or exercise.
title: "[Missing] "
labels: ["content", "missing"]
body:
  - type: dropdown
    id: course
    attributes:
      label: Course
      options:
        - Advanced Computer Architectures
        - Advanced Methods for Scientific Computing
        - Applied Statistics
        - Artificial Neural Networks and Deep Learning
        - Calcolo Numerico
        - Computing Infrastructures
        - Foundations of Operations Research
        - Network Computing
        - Numerical Linear Algebra
        - Numerical Methods for Partial Differential Equations
        - Parallel Computing
        - Quantum Computing
        - Quantum Physics
        - Software Engineering for HPC
        - Other
    validations:
      required: true

  - type: input
    id: topic
    attributes:
      label: Missing topic
      placeholder: "e.g. Bell inequalities, LSTM backpropagation, MPI collectives"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should be added?
      placeholder: |
        - Definition
        - Explanation
        - Formula
        - Example
        - Diagram
        - Exercise
    validations:
      required: true

  - type: textarea
    id: sources
    attributes:
      label: Sources
      placeholder: "Slides, lecture number, book chapter, paper, or link."
