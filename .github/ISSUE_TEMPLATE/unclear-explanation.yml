name: Unclear explanation
description: Mark a section that needs a clearer explanation, intuition, example, or derivation.
title: "[Clarify] "
labels: ["content", "clarification"]
body:
  - type: dropdown
    id: course
    attributes:
      label: Course
      options:
        - Advanced Computer Architectures
        - Advanced Methods for Scientific Computing
        - Applied Statistics
        - Artificial Neural Networks and Deep Learning
        - Calcolo Numerico
        - Computing Infrastructures
        - Foundations of Operations Research
        - Network Computing
        - Numerical Linear Algebra
        - Numerical Methods for Partial Differential Equations
        - Parallel Computing
        - Quantum Computing
        - Quantum Physics
        - Software Engineering for HPC
        - Other
    validations:
      required: true

  - type: input
    id: section
    attributes:
      label: Section
      placeholder: "e.g. No-cloning theorem, CUDA memory hierarchy, type of Hazards."
    validations:
      required: true

  - type: textarea
    id: unclear
    attributes:
      label: What is unclear?
      placeholder: "Explain what feels too fast, too abstract, incomplete, or confusing."
    validations:
      required: true

  - type: checkboxes
    id: needs
    attributes:
      label: What would improve it?
      options:
        - label: More intuition
        - label: Step-by-step derivation
        - label: Numerical example
        - label: Diagram / figure
        - label: Comparison with another concept
        - label: Better terminology
        - label: Short summary box

  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      placeholder: "Optional notes, ideas, or references."
