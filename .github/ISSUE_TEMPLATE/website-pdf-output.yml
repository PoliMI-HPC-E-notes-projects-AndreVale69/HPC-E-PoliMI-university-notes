name: Website / PDF output
description: Report problems with the GitHub Pages website, generated PDFs, links, or navigation.
title: "[Output] "
labels: ["website", "pdf"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - GitHub Pages website
        - Course PDF
        - README link
        - Navigation
        - Badge
        - Other
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location / URL
      placeholder: "Paste the page, PDF, or README link."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: "Broken link, outdated PDF version, missing page, bad rendering, etc."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "What should happen instead?"
